<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — MCA App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #09090b;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background: #18181b;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-wrap svg {
      width: 36px;
      height: 36px;
      color: #fafafa;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.875rem;
      color: #71717a;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #18181b;
      color: #fafafa;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #27272a; }

    .status {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>

  <h1>You're offline</h1>
  <p>MCA App needs an internet connection to load. Please check your Wi-Fi or mobile data and try again.</p>

  <button onclick="window.location.reload()">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Try again
  </button>

  <p class="status" id="status"></p>

  <script>
    window.addEventListener('online', () => window.location.reload());
    document.getElementById('status').textContent =
      navigator.onLine ? '' : 'No internet connection detected';
  </script>
</body>
</html>
